services:
    backend:
        build:
            context: ./backend
            args:
                - BACKEND_PORT=${BACKEND_PORT:-8080}
                - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}

                - MODEL_URI_PROD=${MODEL_URI_PROD}
                - MODEL_URI_DEV=${MODEL_URI_DEV}
                - MODEL_URI_BACKUP=${MODEL_URI_BACKUP}

                - WEAKLINK_MODEL_URI_PROD=${WEAKLINK_MODEL_URI_PROD}
                - WEAKLINK_MODEL_URI_DEV=${WEAKLINK_MODEL_URI_DEV}
                - WEAKLINK_MODEL_URI_BACKUP=${WEAKLINK_MODEL_URI_BACKUP}

                - Z_MODEL_URI_PROD=${Z_MODEL_URI_PROD}
                - Z_MODEL_URI_DEV=${Z_MODEL_URI_DEV}
                - Z_MODEL_URI_BACKUP=${Z_MODEL_URI_BACKUP}
        container_name: 4dt907-backend
        environment:
            - BACKEND_PORT=${BACKEND_PORT:-8080}
            - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}

            - MODEL_URI_PROD=${MODEL_URI_PROD}
            - MODEL_URI_DEV=${MODEL_URI_DEV}
            - MODEL_URI_BACKUP=${MODEL_URI_BACKUP}

            - WEAKLINK_MODEL_URI_PROD=${WEAKLINK_MODEL_URI_PROD}
            - WEAKLINK_MODEL_URI_DEV=${WEAKLINK_MODEL_URI_DEV}
            - WEAKLINK_MODEL_URI_BACKUP=${WEAKLINK_MODEL_URI_BACKUP}

            - Z_MODEL_URI_PROD=${Z_MODEL_URI_PROD}
            - Z_MODEL_URI_DEV=${Z_MODEL_URI_DEV}
            - Z_MODEL_URI_BACKUP=${Z_MODEL_URI_BACKUP}
        ports:
            - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
        volumes:
            - ./backend:/backend_app
            - backend_pycache:/backend_app/__pycache__
            - backend_venv:/backend_app/.venv
        restart: unless-stopped
        networks:
            - app-network
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "-f",
                    "http://localhost:${BACKEND_PORT:-8080}/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        deploy:
            resources:
                limits:
                    cpus: "2"
                    memory: 2G
                reservations:
                    cpus: "0.5"
                    memory: 512M

    frontend:
        build:
            context: ./frontend
            args:
                - BACKEND_PORT=${BACKEND_PORT:-8080}
                - FRONTEND_PORT=${FRONTEND_PORT:-3030}
        container_name: 4dt907-frontend
        environment:
            - FRONTEND_PORT=${FRONTEND_PORT:-3030}
        ports:
            - "${FRONTEND_PORT:-3030}:${FRONTEND_PORT:-3030}"
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - app-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "curl -fsS http://localhost:${FRONTEND_PORT:-3030}/ >/dev/null",
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 60s
        deploy:
            resources:
                limits:
                    cpus: "1"
                    memory: 512M
                reservations:
                    cpus: "0.25"
                    memory: 128M

networks:
    app-network:
        driver: bridge

volumes:
    backend_pycache:
    backend_venv:
